    internal_liaison: "Sales"
    summary_tone: "concerned about uptime, asking for ETA and root cause"

# ── INSIDER THREAT ────────────────────────────────────────────

insider_threat:
  enabled: false

  # "passive" — behaviors injected into normal artifacts (PR descriptions,
  #             Slack messages, emails).  No extra SimEvents are emitted.
  #             Use this when you want a realistic corpus without SIEM noise.
  #
  # "active"  — additionally emits dlp_alert SimEvents (with false positives
  #             mixed in at dlp_noise_ratio).  Use this when you want to train
  #             agents to triage SIEM alert streams.
  mode: "passive"
  subjects:
    # ── Example 1: Negligent employee ────────────────────────────────────────
    # Jordan accidentally commits a credential in a PR description.
    # No malicious intent — the secret appears in a "test fixture" comment.
    # Reviewers may or may not catch it (non-deterministic).
    - name: "Jordan"
      threat_class: "negligent"
      onset_day: 5 # clean behavior on days 1-4; first leak possible day 5
      behaviors:
        - "secret_in_commit"

    # ── Example 2: Disgruntled employee ──────────────────────────────────────
    # Riley's Slack messages become progressively passive-aggressive.
    # Riley also accesses tickets outside their department.
    # No credential leak — detection requires sentiment + access-pattern correlation.
    - name: "Tasha"
      threat_class: "disgruntled"
      onset_day: 10
      behaviors:
        - "sentiment_drift"
        - "cross_dept_snooping"
        - "unusual_hours_access"

    # ── Example 3: Malicious employee ────────────────────────────────────────
    # Jax deliberately exfiltrates data via personal email and
    # clones repositories at anomalous volume.  Jax's Slack messages
    # stay deliberately neutral (hiding intent — handled by sentiment_drift
    # with threat_class: "malicious").
    # This is the hardest case to detect: low Slack signal, high email/git signal.
    - name: "Jax"
      threat_class: "malicious"
      onset_day: 18
      behaviors:
        - "data_exfil_email"
        - "excessive_repo_cloning"
        - "unusual_hours_access"
        - "sentiment_drift"
        - "host_data_hoarding"
        - "social_engineering"

  # Fraction of dlp_alert events that are FALSE POSITIVES for innocent employees.
  # Only applies in mode: "active".
  # 0.0 = every alert is real (easy for agents — not realistic)
  # 0.4 = 40% of alerts are noise (recommended starting point)
  # 0.8 = very noisy (trains agents to demand multi-signal correlation)
  dlp_noise_ratio: 0.4

  # Subdirectory under the simulation export dir for telemetry output.
  # Two files are written here:
  #   access_log.jsonl      — observable telemetry stream (no labels)
  #   _ground_truth.jsonl   — full records with true_positive, threat_class, behavior
  telemetry_dir: "security_telemetry"
  log_format: "all"
  idp_logs: true
